<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamagotchi</title>
    <link rel="stylesheet" href="./style.css">
    <script src="https://kit.fontawesome.com/bd6d25e44b.js" crossorigin="anonymous"></script>
    <script src="./script.js" defer></script>
</head>
<body>
    <section id="tamagotchiBackground">
        <img id="tamagotchiHolder" src="assets/tamagotchi-holder.svg">
        <div id="egg-shape-background">
            <svg id="Layer_1" xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 127.86 160.09">
  
                <defs>
                    <style>
                    .st0 {
                        fill: #fff;
                        opacity: .5;
                    }

                    .st1 {
                        fill: #f8b85b;
                    }
                    </style>
                </defs>
                <g id="Laag_1-2">
                    <path class="st1" d="M127.86,96.47C127.86,43.17,99.13,0,63.82,0S0,42.79,0,96.47c0,35.13,28.62,63.61,63.93,63.61s63.93-28.48,63.93-63.61h0Z"/>
                </g>
                <path class="st0" d="M67.44,4.46c.19.9-8.64,2.08-20.48,8.17-12.64,6.5-18.57,13.39-19.15,12.77-.7-.75,6.82-12.18,19.87-17.87,9.74-4.25,19.56-4,19.76-3.06Z"/>
                <path class="st0" d="M95.44,140.03c-.58-.71,6.72-5.81,14.45-16.66,8.25-11.58,10.36-20.41,11.16-20.13.97.35-.47,13.95-9.45,25-6.7,8.24-15.55,12.53-16.15,11.79Z"/>
                <path class="st0" d="M5.81,91.83c.73-.01-.44,11.21,4.14,25.4,4.7,14.6,12.32,22.54,11.85,22.87-.56.39-12.45-10.25-16.19-26.99-2.52-11.23-.49-21.28.21-21.29Z"/>
            </svg>
        </div>        
        <div id="breaking-egg-shape-background">
            <svg id="Laag_2" data-name="Laag 2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 134.27 134.79">
                <defs>
                    <style>
                    .cls-1 {
                        fill: #335ca7;
                    }
                    </style>
                </defs>
                <g id="Laag_1-2" data-name="Laag 1">
                    <polygon class="cls-1" points="6.69 18.52 10.75 52.73 0 83.34 10.6 100.99 0 116.78 27.78 129.64 56.08 125.53 73.57 134.79 100.32 121.93 113.18 125.01 131.7 109.06 126.56 89.51 134.27 76.65 125.01 50.93 131.19 22.12 101.86 6.17 82.83 10.8 60.71 0 38.07 13.89 16.98 10.29 6.69 18.52"/>
                </g>
            </svg> 
            <section id="tamagotchiScreen">
                <section id="gameSection">
                    <div id="newPetMenu" class="hidden">
                        <p>Select new pet:</p>
                        <div class="petSelect">
                            <div id="cat" class="option">Cat</div>
                            <div id="temp1" class="option">TBD</div>
                            <div id="temp2" class="option">TBD</div>
                        </div>                        
                        <div class="petImages">
                            <div class="previewCat"></div>
                            <div class="preview2"></div>
                            <div class="preview3"></div>
                        </div>
                        
                        <div class="arrowWrapper">
                            <div class="petArrow"  id="leftArrow">
                                <svg width="100%" height="100%" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M18 15L12 9L6 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </div>
                            <div class="petArrow hidden" id="centerArrow">
                                <svg width="100%" height="100%" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M18 15L12 9L6 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </div>
                            <div class="petArrow hidden"  id="rightArrow">
                                <svg width="100%" height="100%" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M18 15L12 9L6 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </div>
                        </div>
                    </div>

                    <div id="statusBarWrapper">
                        <div id="hungerWrapper">
                            <p>Hunger</p>
                            <div class="barWrapper">
                                <div id="hungerBar"></div>
                            </div>
                        </div>
                        <div id="energyWrapper">
                            <p>Energy</p>
                            <div class="barWrapper">
                                <div id="energyBar"></div>
                            </div>
                        </div>
                        <div id="hygeneWrapper">
                            <p>Hygene</p>
                            <div class="barWrapper">
                                <div id="hygeneBar"></div>
                            </div>
                        </div>
                    </div>
                    <div id="homeSection">
                        <div id='bubbleWrapper'>
                            <div id='hungry' class='alertBubble hungry hidden'>Feed me!</div>
                            <div id="tired" class='alertBubble tired hidden'>I need rest!</div>
                            <div id="dirty" class='alertBubble dirty hidden'>Clean me!</div>
                        </div>
                        <div id='petWrapper'>
                            <div id="petSprite"></div>
                        </div>
                        <div id="logBar">
                            <div id="clock">00:00</div>
                        </div>
                    </div>
                </section>
            </section> 
            <section id="gameButtonsSection">
                <button id="leftButton">
                    <i class="fas fa-arrow-circle-left"></i>
                </button>
                <button id="selectButton"></button>
                <button id="rightButton">
                    <i class="fas fa-arrow-circle-right"></i>
                </button>
            </section>
        </div>
    </section> 
</body>
</html>
