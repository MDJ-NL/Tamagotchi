<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamagotchi</title>
    <link rel="stylesheet" href="./style.css">
    <script src="https://kit.fontawesome.com/bd6d25e44b.js" crossorigin="anonymous"></script>
    <script src="./script.js" defer></script>
</head>
<body>
    <section id="tamagotchiBackground">
        <div id="egg-shape-background">
            <img src="assets/egg-shape.svg"> 
        </div>        
        <div id="breaking-egg-shape-background">
            <img src="assets/breaking-egg-shape.svg">   
            <section id="tamagotchiScreen">
                <section id="gameSection">
                    <div id="statusBarWrapper">
                        <div id="hungerWrapper">
                            <p>Hunger</p>
                            <div class="barWrapper">
                                <div id="hungerBar"></div>
                            </div>
                        </div>
                        <div id="energyWrapper">
                            <p>Energy</p>
                            <div class="barWrapper">
                                <div id="energyBar"></div>
                            </div>
                        </div>
                        <div id="happinessWrapper">
                            <p>Happiness</p>
                            <div class="barWrapper">
                                <div id="happinessBar"></div>
                            </div>
                        </div>
                    </div>
                    <div id="homeSection">
                        <div id='bubbleWrapper'>
                            <div id='hungry' class='alertBubble hungry hidden'>Feed me!</div>
                            <div id="tired" class='alertBubble tired hidden'>I need rest!</div>
                            <div id="unhappy" class='alertBubble unhappy hidden'>Play with me!</div>
                        </div>
                        <div id="logBar">Placeholder text</div>
                    </div>
                </section>
            </section> 
            <section id="gameButtonsSection">
                <button id="previousRoom">
                    <i class="fas fa-arrow-circle-left"></i>
                </button>
                <button id="selectButton"></button>
                <button id="nextRoom">
                    <i class="fas fa-arrow-circle-right"></i>
                </button>
            </section>
        </div>
    </section> 
</body>
</html>
