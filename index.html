<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamagotchi</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
</head>
<body>
    <section id="tamagotchiBackground">
        <div id="egg-shape-background">
            <img src="assets/egg-shape.svg"> 
        </div>        
        <div id="breaking-egg-shape-background">
            <img src="assets/breaking-egg-shape.svg">   
            <section id="tamagotchiScreen">
                <section id="gameSection">
                    <div id="statusBarWrapper">
                        <div id="hungerWrapper">
                            <p>Hunger</p>
                            <div>
                                <div id="hungerBar"></div>
                            </div>
                        </div>
                        <div id="energyWrapper">
                            <p>Energy</p>
                            <div>
                                <div id="energyBar"></div>
                            </div>
                        </div>
                        <div id="happinessWrapper">
                            <p>Happiness</p>
                            <div>
                                <div id="happinessBar"></div>
                            </div>
                        </div>
                    </div>
                    <div id="homeSection"></div>
                </section>
            </section> 
            <section id="gameButtonsSection">
                <button id="previousRoom"><</button>
                <button id="selectButton"></button>
                <button id="nextRoom">></button>
            </section>
        </div>
    </section> 
</body>
</html>
